# this file contains the social media links and usernames of the author
# the socials will be displayed in the order they are defined here
# for more information, please refer to the documentation of jekyll-socials plugin: https://github.com/george-gca/jekyll-socials
cv_pdf: /assets/pdf/example_pdf.pdf # path to your CV PDF file
email: your.email@example.com # your email address
# inspirehep_id: # Inspire HEP author ID (remove # to enable)
rss_icon: true # comment this line to hide the RSS icon
# scholar_userid: # your Google Scholar ID (remove # and fill in to enable)
# wechat_qr: # filename of your wechat qr-code saved as an image (e.g., wechat-qr.png if saved to assets/img/wechat-qr.png)
# whatsapp_number: # your WhatsApp number (full phone number in international format. Omit any zeroes, brackets, or dashes when adding the phone number in international format.)
# orcid_id: # your ORCID ID (remove # and fill in to enable)
# github_username: 2534Henry # your GitHub username (remove # to enable)
# linkedin_username: # your LinkedIn username (remove # and fill in to enable)
# twitter_username: # your X/Twitter username (remove # and fill in to enable)
# bluesky_username: # your Bluesky username (remove # and fill in to enable)
